name: bug-triage-env
version: "1.0.0"
description: "Real-world software bug triage environment for AI agent training"
tags:
  - openenv
  - bug-triage
  - software-engineering
  - real-world

tasks:
  - id: issue_classifier
    name: Issue Classification
    difficulty: easy
    max_steps: 1
    task_id: 1

  - id: severity_router
    name: Severity & Component Routing
    difficulty: medium
    max_steps: 2
    task_id: 2

  - id: full_triage
    name: Full Bug Triage
    difficulty: hard
    max_steps: 3
    task_id: 3

action_space: BugTriageAction
observation_space: BugTriageObservation

endpoints:
  reset:  POST /reset
  step:   POST /step
  state:  GET  /state
  health: GET  /health

reward:
  min: 0.0
  max: 1.0
  type: continuous
  partial: true
